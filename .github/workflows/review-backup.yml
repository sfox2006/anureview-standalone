name: Review backup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export ANRevU backups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_REVIEWS_TABLE: ${{ secrets.SUPABASE_REVIEWS_TABLE }}
          SUPABASE_REPORTS_TABLE: ${{ secrets.SUPABASE_REPORTS_TABLE }}
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python scripts/export_reviews_backup.py

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: anreview-backup
          path: backups/review-exports/
          retention-days: 14
